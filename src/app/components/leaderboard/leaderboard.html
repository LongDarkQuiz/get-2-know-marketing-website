<section class="lb">
  <div class="lb__container">
    <div class="lb__layout">
      <div class="lb__image" appReveal>
        <img
          src="{{ content.cdn }}/leaderboard-moment-2cBxWSnEHpeVPChijptVdL.webp"
          alt="Leaderboard moment"
          loading="lazy"
        />
      </div>
      <div class="lb__content" appReveal [delay]="150">
        <h2 class="lb__heading">{{ content.leaderboardHeading() }}</h2>
        <p class="lb__desc">{{ content.leaderboardDesc() }}</p>
        <ul class="lb__features">
          @for (feat of content.leaderboardFeatures(); track feat) {
            <li>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              {{ feat }}
            </li>
          }
        </ul>
      </div>
    </div>
  </div>
</section>
