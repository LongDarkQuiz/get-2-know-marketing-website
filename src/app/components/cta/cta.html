<section class="cta">
  <div class="cta__container" appReveal>
    <h2 class="cta__heading">{{ content.ctaHeading() }}</h2>
    <p class="cta__desc">{{ content.ctaDesc() }}</p>
    <a [href]="content.ctaCta().href" class="cta__btn">
      {{ content.ctaCta().label }}
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </a>
  </div>
</section>
