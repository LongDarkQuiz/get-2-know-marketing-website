<nav class="navbar" [class.scrolled]="scrolled()">
  <div class="navbar__inner">
    <a href="#" class="navbar__logo">
      get2kn<span class="navbar__logo-accent">o</span>w
    </a>

    <ul class="navbar__links" [class.open]="mobileOpen()">
      @for (link of content.navLinks(); track link.label) {
        <li>
          <a [href]="link.href" (click)="closeMobile()">{{ link.label }}</a>
        </li>
      }
      <li class="navbar__mobile-cta">
        <a [href]="content.navCta().href" class="navbar__cta" (click)="closeMobile()">
          {{ content.navCta().label }}
        </a>
      </li>
    </ul>

    <a [href]="content.navCta().href" class="navbar__cta navbar__desktop-cta">
      {{ content.navCta().label }}
    </a>

    <button class="navbar__burger" (click)="toggleMobile()" [attr.aria-label]="mobileOpen() ? 'Close menu' : 'Open menu'">
      <span [class.open]="mobileOpen()"></span>
    </button>
  </div>
</nav>

@if (mobileOpen()) {
  <div class="navbar__overlay" (click)="closeMobile()"></div>
}
