<section class="pcard">
  <div class="pcard__container">
    <div class="pcard__layout">
      <div class="pcard__content" appReveal>
        <h2 class="pcard__heading">{{ content.cardHeading() }}</h2>
        <p class="pcard__desc">{{ content.cardDesc() }}</p>
        <ul class="pcard__features">
          @for (feat of content.cardFeatures(); track feat) {
            <li>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              {{ feat }}
            </li>
          }
        </ul>
      </div>
      <div class="pcard__image" appReveal [delay]="150">
        <img
          src="{{ content.cdn }}/qr-card-mockup-FGR66kGAskWPVgNCxmhFBK.webp"
          alt="QR card mockup"
          loading="lazy"
        />
      </div>
    </div>
  </div>
</section>
